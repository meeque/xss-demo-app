<div class="dropdown mb-3">

  <div
      [attr.aria-controls]="'xss-combobox-input-component-' + componentId"
      [attr.aria-expanded]="menuExpanded()"
      aria-haspopup="true">
    <div class="input-group">
      <input type="text" class="form-control" [(ngModel)]="query" [placeholder]="placeholder()" (focus)="toggleMenu(true)" (input)="toggleMenu(true)">
      <button type="button" (click)="toggleMenu()" class="btn btn-outline-secondary dropdown-toggle" [class.show]="menuExpanded()" [attr.aria-label]="menuExpanded() ? 'Close dropdown' : 'Open dropdown'"></button>
    </div>
  </div>

  <div
      [id]="'xss-combobox-input-component-' + componentId"
      class="dropdown-menu w-100 p-0"
      [class.show]="menuExpanded()"
      [attr.aria-hidden]="!menuExpanded()">
    <div class="overflow-y-auto">
      <ul class="list-group list-group-flush">
        @for (item of items(); track item) {
          <ng-container
              [ngTemplateOutlet]="item.template || defaultMenuItem"
              [ngTemplateOutletContext]="itemContext(item)">
          </ng-container>
        }
      </ul>
      @for (group of groups(); track group) {
        <div class="list-group list-group-item fw-semibold bg-body-secondary">
          <span>{{ group.name }}</span>
        </div>
        <ul class="list-group list-group-flush">
          @for (item of group.items; track item) {
            <ng-container
                [ngTemplateOutlet]="item.template || defaultMenuItem"
                [ngTemplateOutletContext]="itemContext(item)">
            </ng-container>
          }
        </ul>
      }
    </div>
  </div>

</div>

<ng-template #defaultMenuItem let-item="item">
  @if (filter(item)) {
    <li class="list-group-item list-group-item-action btn" (click)="select(item, $event)" (keypress)="select(item, $event)" tabindex="0">
      {{ item.name }}
    </li>
  }
</ng-template>
